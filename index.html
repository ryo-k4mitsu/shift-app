<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト管理アプリ</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f5f5f5;
}

/* ヘッダー */
.header {
  background: #111;
  color: white;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
}

/* 入力エリア */
.controls {
  padding: 10px;
  background: white;
  display: flex;
  gap: 5px;
}

.controls input {
  flex: 1;
  padding: 8px;
  font-size: 16px;
}

.controls button {
  padding: 8px;
  font-size: 14px;
}

/* カレンダー */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background: #eee;
  font-size: 12px;
}

td {
  width: 14.2%;
  height: 70px;
  text-align: center;
  vertical-align: top;
  border: 1px solid #ddd;
  font-size: 12px;
  padding: 2px;
}

/* シフト色 */
.off { background: #b6fcb6; font-weight: bold; }
.day { background: #aee3ff; }
.night { background: #d2b6ff; }
.matsuya { background: #ffb3b3; }

.double {
  background: linear-gradient(135deg, #d2b6ff 50%, #ffb3b3 50%);
  font-size: 10px;
}

/* 合計 */
.summary {
  padding: 10px;
  background: white;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">シフト管理</div>

<div class="controls">
  <input type="number" id="year" value="2026">
  <input type="number" id="month" value="4">
  <button onclick="generate()">作成</button>
</div>

<div id="calendar"></div>
<div id="summary" class="summary"></div>

<script>
let shifts = [];
let lastDate;

const patterns = ["休", "昼", "夜", "松", "夜松"];

function generate() {
  const y = +year.value;
  const m = +month.value - 1;

  lastDate = new Date(y, m + 1, 0).getDate();
  shifts = Array(lastDate).fill("");

  for (let d = 1; d <= lastDate; d++) {
    let dow = new Date(y, m, d).getDay();

    if (dow === 0) shifts[d-1] = "休";
    else if (dow === 1 || dow === 6) shifts[d-1] = "夜松";
    else if (dow === 2 || dow === 4) shifts[d-1] = "昼";
    else shifts[d-1] = "夜";
  }

  render(y, m);
  saveData();
}

function render(y, m) {
  let html = "<table><tr>";
  const days = ["日","月","火","水","木","金","土"];
  days.forEach(d => html += "<th>"+d+"</th>");
  html += "</tr><tr>";

  let firstDay = new Date(y, m, 1).getDay();
  let count = 0;

  for (let i = 0; i < firstDay; i++) {
    html += "<td></td>";
    count++;
  }

  for (let d = 1; d <= lastDate; d++) {
    html += `<td onclick="change(${d-1})">${d}<br>${display(shifts[d-1])}</td>`;
    count++;
    if (count % 7 === 0) html += "</tr><tr>";
  }

  html += "</tr></table>";
  calendar.innerHTML = html;

  updateSummary();
}

function display(s) {
  if (s === "休") return `<div class="off">休</div>`;
  if (s === "昼") return `<div class="day">昼</div>`;
  if (s === "夜") return `<div class="night">夜</div>`;
  if (s === "松") return `<div class="matsuya">松</div>`;
  if (s === "夜松") return `<div class="double">夜松</div>`;
}

function change(i) {
  let idx = patterns.indexOf(shifts[i]);
  shifts[i] = patterns[(idx + 1) % patterns.length];
  render(+year.value, +month.value - 1);
  saveData();
}

function updateSummary() {
  let count = {昼:0, 夜:0, 松:0, 休:0};

  shifts.forEach(s => {
    if (s === "夜松") {
      count["夜"]++;
      count["松"]++;
    } else {
      count[s]++;
    }
  });

  summary.innerHTML =
    `昼:${count["昼"]} 夜:${count["夜"]} 松屋:${count["松"]} 休:${count["休"]}`;
}

function getKey() {
  return `shift_${year.value}_${month.value}`;
}

function saveData() {
  localStorage.setItem(getKey(), JSON.stringify(shifts));
}

function loadData() {
  const data = localStorage.getItem(getKey());
  if (data) {
    shifts = JSON.parse(data);
    lastDate = shifts.length;
    render(+year.value, +month.value - 1);
  }
}
</script>

</body>
</html>
</html>
