<script>
const LIMITS = {
 昼:{min:5,max:8},
 夜:{min:10,max:12},
 松:{min:12,max:16}
};

function generate(){
 const y=+year.value, m=+month.value-1;
 lastDate=new Date(y,m+1,0).getDate();

 shifts=Array(lastDate).fill("休");
 hoursData=Array(lastDate).fill(null);

 let count={昼:0,夜:0,松:0};

 // ① 日曜は休み固定
 for(let d=1;d<=lastDate;d++){
  let dow=new Date(y,m,d).getDay();
  if(dow===0) shifts[d-1]="休";
 }

 // ② 昼（火木）
 for(let d=1;d<=lastDate;d++){
  let dow=new Date(y,m,d).getDay();
  if((dow===2||dow===4) && count["昼"]<LIMITS["昼"].max){
    shifts[d-1]="昼";
    count["昼"]++;
  }
 }

 // ③ 夜松（月土）※ここが重要
 for(let d=1;d<=lastDate;d++){
  let dow=new Date(y,m,d).getDay();
  if((dow===1||dow===6)
    && count["夜"]<LIMITS["夜"].max
    && count["松"]<LIMITS["松"].max){
      shifts[d-1]="夜松";
      count["夜"]++;
      count["松"]++;
  }
 }

 // ④ 残りを必要分だけ埋める
 for(let i=0;i<lastDate;i++){
  if(shifts[i]!=="休") continue;

  if(count["昼"]<LIMITS["昼"].min){
    shifts[i]="昼"; count["昼"]++;
  }
  else if(count["夜"]<LIMITS["夜"].min){
    shifts[i]="夜"; count["夜"]++;
  }
  else if(count["松"]<LIMITS["松"].min){
    shifts[i]="松"; count["松"]++;
  }
 }

 // ⑤ 上限チェック（最終ガード）
 for(let i=0;i<lastDate;i++){
  if(shifts[i]==="昼" && count["昼"]>LIMITS["昼"].max){
    shifts[i]="休"; count["昼"]--;
  }
  if(shifts[i]==="夜" && count["夜"]>LIMITS["夜"].max){
    shifts[i]="休"; count["夜"]--;
  }
  if(shifts[i]==="松" && count["松"]>LIMITS["松"].max){
    shifts[i]="休"; count["松"]--;
  }
  if(shifts[i]==="夜松"){
    if(count["夜"]>LIMITS["夜"].max || count["松"]>LIMITS["松"].max){
      shifts[i]="休";
      count["夜"]--;
      count["松"]--;
    }
  }
 }

 render(y,m);
}
</script>
