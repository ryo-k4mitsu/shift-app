<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>シフト管理 完成版</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#f5f5f5;
  padding-bottom:90px; /* ←スクロール改善 */
}

.header {
  text-align:center;
  padding:10px;
  font-size:18px;
  font-weight:bold;
}

/* 入力 */
.controls {
  display:flex;
  flex-direction:column;
  gap:6px;
  padding:8px;
}

.controls input, .controls button {
  width:100%;
  padding:6px;
}

/* カレンダー */
table { width:100%; border-collapse:collapse; background:white; }
td,th { border:1px solid #ddd; text-align:center; font-size:12px; }

td {
  height:72px;
  padding:0;
}

.cell {
  display:flex;
  flex-direction:column;
  height:100%;
}

.date {
  font-size:11px;
  padding:2px;
}

.shift {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:bold;
  white-space:nowrap;
}

/* 色 */
.off{background:#b6fcb6;}
.day{background:#aee3ff;}
.night{background:#d2b6ff;}
.matsuya{background:#ffb3b3;}
.double{background:linear-gradient(135deg,#d2b6ff 50%,#ffb3b3 50%);}

/* 給料 */
#salary {
  margin:10px;
  padding:12px;
  background:white;
  border-radius:12px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* 集計 */
#summary {
  margin:10px;
  text-align:center;
}

/* 下メニュー */
.bottom-bar {
 position:fixed;
 bottom:0;
 width:100%;
 background:white;
 display:flex;
 justify-content:space-around;
 padding:10px 0;
 border-top:1px solid #ccc;
}

/* モーダル */
.modal {
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:white;
 padding:20px;
 border-radius:10px;
 display:none;
}
</style>
</head>

<body>

<div class="header">シフト管理</div>

<div class="controls">
  <input type="number" id="year" value="2026">
  <input type="number" id="month" value="4">

  <span>昼回数</span>
  <input type="number" id="dayCount" value="6">

  <span>夜回数</span>
  <input type="number" id="nightCount" value="11">

  <span>松回数</span>
  <input type="number" id="matsuCount" value="14">

  <button onclick="toggleEdit()" id="modeBtn">閲覧モード</button>
</div>

<div id="calendar"></div>
<div id="summary"></div>
<div id="salary"></div>

<div class="bottom-bar">
  <button onclick="prevMonth()">←</button>
  <button onclick="generate(true)">再生成</button>
  <button onclick="nextMonth()">→</button>
</div>

<div id="modal" class="modal">
  <div id="modalDate"></div>
  <input type="number" id="hours" step="0.5">時間<br><br>
  <button onclick="saveHours()">保存</button>
  <button onclick="closeModal()">閉じる</button>
</div>

<script>
let shifts=[], hoursData=[], lastDate, selectedIndex;
let pressTimer, editMode=false;

const patterns=["昼","夜","松","夜松","休"];

// 保存
function getKey(){
 return `shift_${year.value}_${month.value}`;
}

function saveData(){
 localStorage.setItem(getKey(), JSON.stringify({shifts, hoursData}));
}

function loadData(){
 const d=localStorage.getItem(getKey());
 if(d){
  const p=JSON.parse(d);
  shifts=p.shifts;
  hoursData=p.hoursData;
  lastDate=shifts.length;
  render(+year.value,+month.value-1);
  return true;
 }
 return false;
}

// モード
function toggleEdit(){
 editMode=!editMode;
 modeBtn.innerText=editMode?"編集モード":"閲覧モード";
}

// 生成
function generate(force=false){
 if(!force && loadData()) return;

 const y=+year.value,m=+month.value-1;
 lastDate=new Date(y,m+1,0).getDate();

 shifts=Array(lastDate).fill("");
 hoursData=Array(lastDate).fill(null);

 let target={
  昼:+dayCount.value,
  夜:+nightCount.value,
  松:+matsuCount.value
 };

 let count={昼:0,夜:0,松:0};

 // 休み（日曜＋隔週水曜）
 let w=0;
 for(let d=1;d<=lastDate;d++){
  let dow=new Date(y,m,d).getDay();
  if(dow===0) shifts[d-1]="休";
  else if(dow===3){
    if(w%2===0) shifts[d-1]="休";
    w++;
  }
 }

 // 夜松
 for(let d=1;d<=lastDate;d++){
  let i=d-1;
  let dow=new Date(y,m,d).getDay();
  if(shifts[i]===""&&(dow===1||dow===6)
    && count["夜"]<target["夜"]
    && count["松"]<target["松"]){
    shifts[i]="夜松";
    count["夜"]++;
    count["松"]++;
  }
 }

 // 昼
 for(let d=1;d<=lastDate;d++){
  let i=d-1;
  let dow=new Date(y,m,d).getDay();
  if(shifts[i]===""&&(dow===2||dow===4)
    && count["昼"]<target["昼"]){
    shifts[i]="昼";
    count["昼"]++;
  }
 }

 // 残り
 for(let i=0;i<lastDate;i++){
  if(shifts[i]!=="") continue;

  if(count["昼"]<target["昼"]){
    shifts[i]="昼"; count["昼"]++;
  }
  else if(count["夜"]<target["夜"]){
    shifts[i]="夜"; count["夜"]++;
  }
  else if(count["松"]<target["松"]){
    shifts[i]="松"; count["松"]++;
  }
  else{
    shifts[i]="休";
  }
 }

 saveData();
 render(y,m);
}

// 描画
function render(y,m){
 let html="<table><tr>";
 ["日","月","火","水","木","金","土"].forEach(d=>html+="<th>"+d+"</th>");
 html+="</tr><tr>";

 let first=new Date(y,m,1).getDay(),c=0;
 for(let i=0;i<first;i++){html+="<td></td>";c++;}

 for(let d=1;d<=lastDate;d++){
  html+=`
  <td 
    onmousedown="startPress(${d-1})"
    onmouseup="endPress(${d-1})"
    ontouchstart="startPress(${d-1})"
    ontouchend="endPress(${d-1})"
  >
    <div class="cell">
      <div class="date">${d}</div>
      ${view(shifts[d-1])}
    </div>
  </td>`;
  c++; if(c%7===0)html+="</tr><tr>";
 }

 html+="</tr></table>";
 calendar.innerHTML=html;

 updateSummary();
 calcSalary();
}

// 操作
function startPress(i){
 if(!editMode) return;
 pressTimer=setTimeout(()=>openModal(i),500);
}

function endPress(i){
 clearTimeout(pressTimer);
 if(!editMode) return;
 changeShift(i);
}

function changeShift(i){
 let idx=patterns.indexOf(shifts[i]);
 shifts[i]=patterns[(idx+1)%patterns.length];
 saveData();
 render(+year.value,+month.value-1);
}

// 表示
function view(s){
 if(s==="休")return `<div class="shift off">休</div>`;
 if(s==="昼")return `<div class="shift day">昼</div>`;
 if(s==="夜")return `<div class="shift night">夜</div>`;
 if(s==="松")return `<div class="shift matsuya">松</div>`;
 if(s==="夜松")return `<div class="shift double">夜松</div>`;
}

// 時間変更
function openModal(i){
 selectedIndex=i;
 modal.style.display="block";
 hours.value = hoursData[i] ?? defaultHours(shifts[i]);
 modalDate.innerText=`${i+1}日`;
}

function defaultHours(s){
 if(s==="昼")return 5;
 if(s==="夜")return 3.5;
 if(s==="松")return 5;
 if(s==="夜松")return 8.5;
 return 0;
}

function saveHours(){
 hoursData[selectedIndex]=+hours.value;
 saveData();
 closeModal();
 calcSalary();
}

function closeModal(){ modal.style.display="none"; }

// 給料
function calcSalary(){
 let total=0;
 shifts.forEach((s,i)=>{
  let h=hoursData[i]??defaultHours(s);
  total+=h*1100;
 });

 salary.innerHTML = `
   <div style="font-size:14px;">💰 月収目安</div>
   <div style="font-size:26px; margin-top:5px; font-weight:bold;">
     ${Math.round(total).toLocaleString()} 円
   </div>
 `;
}

// 集計
function updateSummary(){
 let c={昼:0,夜:0,松:0,休:0};
 shifts.forEach(s=>{
  if(s==="夜松"){c["夜"]++;c["松"]++;}
  else c[s]++;
 });
 summary.innerHTML=`昼:${c["昼"]} / 夜:${c["夜"]} / 松:${c["松"]} / 休:${c["休"]}`;
}

// 月移動
function prevMonth(){month.value--;if(month.value<1){month.value=12;year.value--;}generate();}
function nextMonth(){month.value++;if(month.value>12){month.value=1;year.value++;}generate();}

generate();
</script>

</body>
</html>
